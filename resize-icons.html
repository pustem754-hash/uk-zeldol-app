<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Создание иконок PWA</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: #DCEDC8;
            background-image: 
                radial-gradient(circle at 20% 50%, rgba(139, 195, 74, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(139, 195, 74, 0.08) 0%, transparent 50%);
            color: #1A4D2E;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        h1 {
            color: #2E7D32;
            margin-bottom: 20px;
            text-align: center;
        }
        .upload-area {
            border: 3px dashed #4CAF50;
            padding: 40px;
            text-align: center;
            border-radius: 10px;
            margin-bottom: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .upload-area:hover {
            background: #f0f8f0;
        }
        input[type="file"] {
            display: none;
        }
        .btn {
            padding: 15px 30px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin: 10px 5px;
            transition: all 0.3s;
        }
        .btn:hover { background: #2E7D32; }
        .preview {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin: 20px 0;
        }
        .preview-item {
            text-align: center;
            padding: 15px;
            background: #f9f9f9;
            border-radius: 8px;
        }
        .preview-item img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
        }
        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none;
        }
        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🖼️ Создание иконок PWA</h1>
        
        <div class="upload-area" onclick="document.getElementById('fileInput').click()">
            <p style="font-size: 48px; margin-bottom: 10px;">📁</p>
            <p style="color: #2E7D32; font-weight: bold;">Нажмите для загрузки logo-original.png</p>
            <p style="color: #666; font-size: 14px; margin-top: 5px;">или перетащите файл сюда</p>
        </div>
        
        <input type="file" id="fileInput" accept="image/png">
        
        <div id="preview" class="preview"></div>
        
        <div style="text-align: center;">
            <button class="btn" onclick="createIcons()">🎨 Создать иконки</button>
            <button class="btn" onclick="downloadAll()">⬇️ Скачать все</button>
        </div>
        
        <div id="status" class="status"></div>
        
        <div id="downloadLinks" style="margin-top: 20px;"></div>
    </div>

    <script>
        let originalImage = null;
        let createdIcons = {};

        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file && file.type === 'image/png') {
                const reader = new FileReader();
                reader.onload = function(event) {
                    originalImage = new Image();
                    originalImage.onload = function() {
                        showPreview();
                    };
                    originalImage.src = event.target.result;
                };
                reader.readAsDataURL(file);
            }
        });

        function showPreview() {
            const preview = document.getElementById('preview');
            preview.innerHTML = `
                <div class="preview-item">
                    <h3>Оригинал</h3>
                    <img src="${originalImage.src}" alt="Original">
                    <p>${originalImage.width}x${originalImage.height}</p>
                </div>
                <div class="preview-item">
                    <h3>192x192</h3>
                    <div id="preview192">Будет создан</div>
                </div>
                <div class="preview-item">
                    <h3>512x512</h3>
                    <div id="preview512">Будет создан</div>
                </div>
            `;
        }

        function createIcons() {
            if (!originalImage) {
                showStatus('Ошибка: Загрузите изображение сначала!', 'error');
                return;
            }

            try {
                // Создаем иконки
                createdIcons['logo-192x192.png'] = resizeImage(originalImage, 192);
                createdIcons['logo-512x512.png'] = resizeImage(originalImage, 512);
                createdIcons['apple-touch-icon.png'] = resizeImage(originalImage, 180);

                // Показываем превью
                document.getElementById('preview192').innerHTML = `<img src="${createdIcons['logo-192x192.png']}" alt="192x192">`;
                document.getElementById('preview512').innerHTML = `<img src="${createdIcons['logo-512x512.png']}" alt="512x512">`;

                showStatus('✅ Иконки успешно созданы! Нажмите "Скачать все"', 'success');
                
                // Показываем ссылки для скачивания
                showDownloadLinks();

            } catch (error) {
                showStatus('Ошибка при создании иконок: ' + error.message, 'error');
            }
        }

        function resizeImage(image, size) {
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');
            
            // Используем высококачественное масштабирование
            ctx.drawImage(image, 0, 0, size, size);
            
            return canvas.toDataURL('image/png');
        }

        function showDownloadLinks() {
            const container = document.getElementById('downloadLinks');
            let html = '<div style="background: #f9f9f9; padding: 15px; border-radius: 8px;">';
            html += '<h3 style="margin-bottom: 10px; color: #2E7D32;">📥 Скачать иконки:</h3>';
            
            for (const [filename, dataUrl] of Object.entries(createdIcons)) {
                html += `<a href="${dataUrl}" download="${filename}" style="display: block; padding: 8px; margin: 5px 0; background: white; border-radius: 5px; text-decoration: none; color: #2E7D32; font-weight: bold;">📄 ${filename}</a>`;
            }
            
            html += '</div>';
            container.innerHTML = html;
        }

        function downloadAll() {
            if (Object.keys(createdIcons).length === 0) {
                showStatus('Ошибка: Сначала создайте иконки!', 'error');
                return;
            }

            for (const [filename, dataUrl] of Object.entries(createdIcons)) {
                const link = document.createElement('a');
                link.href = dataUrl;
                link.download = filename;
                link.click();
            }
            
            showStatus('✅ Все иконки скачаны! Замените файлы в папке public/', 'success');
        }

        function showStatus(message, type) {
            const statusDiv = document.getElementById('status');
            statusDiv.textContent = message;
            statusDiv.className = `status ${type}`;
            statusDiv.style.display = 'block';
        }

        // Drag and drop
        const uploadArea = document.querySelector('.upload-area');
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.style.background = '#e8f5e9';
        });
        
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.style.background = '';
        });
        
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            const file = e.dataTransfer.files[0];
            if (file && file.type === 'image/png') {
                const reader = new FileReader();
                reader.onload = function(event) {
                    originalImage = new Image();
                    originalImage.onload = function() {
                        showPreview();
                    };
                    originalImage.src = event.target.result;
                };
                reader.readAsDataURL(file);
            }
        });
    </script>
</body>
</html>
